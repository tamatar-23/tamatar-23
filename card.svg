    .contrib { font: bold 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #d19a66; }
    .green { font: bold 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #73daca; }
