<svg xmlns="http://www.w3.org/2000/svg" width="850" height="340" viewBox="0 0 850 340" fill="none">
  <style>
    .bg { fill: #ffffff; stroke: #d0d7de; stroke-width: 1.5px; rx: 10px; }
    .prompt { font: bold 14px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #0969da; }
    .bar { font: 14px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #8c959f; }
    .key { font: bold 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #9a6a00; }
    .dot { font: 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #8c959f; }
    .val { font: 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #24292f; }
    .section { font: bold 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #8250df; }
    .add { font: bold 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #1a7f37; }
    .del { font: bold 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #cf222e; }
    .accent { font: bold 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #8250df; }
    .sub { font: bold 13px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #0550ae; }
    .ascii { font: 12px "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; fill: #0969da; opacity: 0.85; }
  </style>

  <rect width="850" height="340" class="bg" />

